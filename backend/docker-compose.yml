version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes: # Volume mount to sync your local code with the container:
      - .:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      - MONGODB_URL=${MONGODB_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - MODEL_NAME=${MODEL_NAME}
      - DISTANCE_THRESHOLD_SMALL=${DISTANCE_THRESHOLD_SMALL}
      - DISTANCE_THRESHOLD_MEDIUM=${DISTANCE_THRESHOLD_MEDIUM}
      - DISTANCE_THRESHOLD_LARGE=${DISTANCE_THRESHOLD_LARGE}
      - SECRET_KEY=${SECRET_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
      - GMAIL_SENDER_EMAIL=${GMAIL_SENDER_EMAIL}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST}
    depends_on:
      - ollama
    networks:
      - app-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: ollama serve
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 10 && ollama pull llama3.2:latest && ollama pull nomic-embed-text && wait"]

volumes:
  ollama_data:

networks:
  app-network:
    driver: bridge